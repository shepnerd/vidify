asr:
  model: whisper
  size: small                    # HF-managed: Systran/faster-whisper-small
  language: null

mllm:
  heavy:
    base_url: http://localhost:8000/v1
    max_tokens: 512
    model_name: qwen3.5-9b
    temperature: 0.7
  light:
    base_url: http://localhost:8000/v1
    max_tokens: 256
    model_name: qwen3.5-4b
    temperature: 0.5
  mla:
    base_url: http://localhost:8001/v1
    max_tokens: 512
    model_name: qwen3-mla
    temperature: 0.7

ocr:
  engine: paddleocr
  lang: ch
  use_angle_cls: true
  det_model_dir: models/paddleocr/det
  rec_model_dir: models/paddleocr/rec
  cls_model_dir: models/paddleocr/cls

object_detection:
  model: models/yolov8n.pt
  conf_threshold: 0.5

emotion_analysis:
  audio_model: superb/wav2vec2-base-superb-er    # HF-managed
  visual_model: fer

translation:
  model: Helsinki-NLP/opus-mt-en-zh               # HF-managed
  source_lang: en
  target_lang: zh
