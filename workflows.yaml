# workflows.yaml - 工作流配置
brief:
  steps:
    - download_video
    - probe
    - extract_subtitles
    - extract_audio
    - asr
    - sufficiency_check
    - vision_caption      # conditional: skipped if transcript is sufficient
    - timeline_build
    - summarize
  asr_first: true
  min_coverage_ratio: 0.3
  min_word_count: 50
  force_visual: false
  prefer_subtitles_over_asr: true
  max_frames: 64
  output_format: "text"
  parallel_segments:
    enabled: false
    segmentor_name: scene
    segment_duration: 180
    scene_threshold: 0.25
    max_workers: 4
    min_video_duration: 300
    min_segment_duration: 20
  parallel_asr:
    enabled: false
    max_workers: 4
    segment_duration: 240
    min_audio_duration: 300
    min_segment_duration: 30

detailed:
  steps:
    - download_video
    - probe
    - extract_subtitles
    - extract_audio
    - asr
    - sufficiency_check
    - sample_frames       # always: needed for OCR/detection
    - vision_caption      # conditional: skipped if transcript is sufficient
    - ocr
    - object_detection
    - emotion_analysis
    - translation
    - timeline_build
    - summarize
  asr_first: true
  min_coverage_ratio: 0.3
  min_word_count: 50
  force_visual: false
  prefer_subtitles_over_asr: true
  max_frames: 128
  max_parallel_skills: 3
  output_format: "json"
  # Parallel segment processing for long videos.
  # When enabled, videos longer than min_video_duration are split into
  # temporal segments and processed concurrently (frame sampling, captioning,
  # OCR, detection, emotion). Results are merged before timeline generation.
  parallel_segments:
    enabled: false              # set true to activate
    segmentor_name: scene       # duration | scene
    segment_duration: 180       # cap long scenes at 3 min
    scene_threshold: 0.25       # ffmpeg scene-detect threshold
    max_workers: 4              # concurrent segment workers
    min_video_duration: 300     # only parallelize videos longer than this (seconds)
    min_segment_duration: 20    # merge tail segments shorter than this
  parallel_asr:
    enabled: false
    max_workers: 4
    segment_duration: 240
    min_audio_duration: 300
    min_segment_duration: 30

live_stream:
  steps:
    - process_live_stream
  heavy_interval: 30
  resolution: "640x480"
  fps: 10
  output_format: "stream"
