# workflows.yaml - 工作流配置
brief:
  steps:
    - download_video
    - probe
    - extract_subtitles
    - extract_audio
    - asr
    - sufficiency_check
    - vision_caption      # conditional: skipped if transcript is sufficient
    - timeline_build
    - summarize
  asr_first: true
  min_coverage_ratio: 0.3
  min_word_count: 50
  force_visual: false
  prefer_subtitles_over_asr: true
  max_frames: 64
  output_format: "text"

detailed:
  steps:
    - download_video
    - probe
    - extract_subtitles
    - extract_audio
    - asr
    - sufficiency_check
    - sample_frames       # always: needed for OCR/detection
    - vision_caption      # conditional: skipped if transcript is sufficient
    - ocr
    - object_detection
    - emotion_analysis
    - translation
    - timeline_build
    - summarize
  asr_first: true
  min_coverage_ratio: 0.3
  min_word_count: 50
  force_visual: false
  prefer_subtitles_over_asr: true
  max_frames: 128
  max_parallel_skills: 3
  output_format: "json"
  # Parallel segment processing for long videos.
  # When enabled, videos longer than min_video_duration are split into
  # temporal segments and processed concurrently (frame sampling, captioning,
  # OCR, detection, emotion). Results are merged before timeline generation.
  parallel_segments:
    enabled: false              # set true to activate
    segment_duration: 300       # seconds per segment (5 min)
    max_workers: 4              # concurrent segment workers
    min_video_duration: 300     # only parallelize videos longer than this (seconds)
    min_segment_duration: 30    # merge tail segments shorter than this

live_stream:
  steps:
    - process_live_stream
  heavy_interval: 30
  resolution: "640x480"
  fps: 10
  output_format: "stream"
