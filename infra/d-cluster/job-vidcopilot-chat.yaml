# job-vidcopilot-chat.yaml — Run VidCopilot chat simulation on D-cluster
#
# One-shot job: starts vLLM on Ascend NPU, runs analysis + chat simulation, then exits.
#
# Notes:
#   - Uses Qwen2.5-VL-7B-Instruct (Qwen3.5-9B head_dim=256 unsupported by NPU kernel)
#   - Requires --enforce-eager (NPU graph capture OOM) and --max-model-len 16384
#   - Model must be pre-downloaded to /data/models/ via hf-mirror
#   - Whisper model pre-downloaded to models/faster-whisper-small (bundled in repo)
#   - Video must be pre-cached at /data/vidcopilot-cache/downloads/SSya123u9Yk.mp4
#     or will be copied from the repo's cache/
#
# Flow:
#   1. Start vLLM with Qwen2.5-VL on 4 NPUs (background)
#   2. Wait for vLLM ready
#   3. Run detailed analysis (no --force-visual, let ASR sufficiency work)
#   4. Run chat simulation with preset questions
#   5. Save results to /data/vidcopilot-results/
#
# Usage:
#   job-run vidcopilot-chat -f ./infra/d-cluster/job-vidcopilot-chat.yaml

kind: 'Job'
apiVersion: 'batch.volcano.sh/v1alpha1'
metadata:
  namespace: 'default'
  labels:
    lepton.sensetime.com/framework-type: 'PyTorch'
    ring-controller.atlas: 'ascend-910b'
  annotations:
    sp-block: '4'
spec:
  schedulerName: 'volcano'
  minAvailable: 1
  tasks:
    - name: 'master'
      replicas: 1
      minAvailable: 1
      template:
        metadata:
          labels:
            ring-controller.atlas: 'ascend-910b'
        spec:
          dnsConfig:
            nameservers:
              - '10.135.0.138'
          volumes:
            - name: 'vc-a3-llmit-data'
              hostPath:
                path: '/mnt/hwfile/vc-a3-llmit'
            - name: 'shm-data'
              emptyDir:
                medium: 'Memory'
                sizeLimit: '64Gi'
          containers:
            - name: 'master'
              image: 'registry2.d.pjlab.org.cn/ccr-hw/910c:vllm-ascend-0.18.0rc1-a3-0409'
              command:
                - 'bash'
                - '-c'
              args:
                - |
                  set -e

                  # ── Ascend environment ──
                  source /usr/local/Ascend/ascend-toolkit/set_env.sh || true
                  source /usr/local/Ascend/nnal/atb/set_env.sh || true
                  export LD_LIBRARY_PATH=/usr/local/Ascend/driver/lib64:/usr/local/Ascend/driver/lib64/common:/usr/local/Ascend/driver/lib64/driver:${LD_LIBRARY_PATH:-}

                  echo "=== NPU check ==="
                  python3 -c "import torch, torch_npu; print(f'NPUs: {torch.npu.device_count()}')"

                  # ── Setup vidcopilot ──
                  cd /workspace
                  if [ ! -d vidcopilot ]; then
                    echo "Cloning vidcopilot..."
                    pip install -i https://pkg.pjlab.org.cn/repository/pypi-proxy/simple/ --trusted-host pkg.pjlab.org.cn --no-cache-dir gitpython 2>/dev/null || true
                    git clone https://github.com/user/vidcopilot.git vidcopilot 2>/dev/null || true
                  fi
                  cd /workspace/vidcopilot 2>/dev/null || cd /workspace

                  # Install deps (skip torch/vllm — already in image)
                  pip install -i https://pkg.pjlab.org.cn/repository/pypi-proxy/simple/ \
                    --trusted-host pkg.pjlab.org.cn --no-cache-dir \
                    rich click openai pydantic PyYAML requests faster-whisper 2>/dev/null || true

                  # ── Prepare video cache ──
                  VIDEO_PATH="cache/downloads/SSya123u9Yk.mp4"
                  if [ ! -f "$VIDEO_PATH" ]; then
                    mkdir -p cache/downloads
                    # Try copy from shared storage
                    if [ -f /data/vidcopilot-cache/downloads/SSya123u9Yk.mp4 ]; then
                      cp /data/vidcopilot-cache/downloads/SSya123u9Yk.mp4 "$VIDEO_PATH"
                    else
                      echo "ERROR: Video not found. Upload to /data/vidcopilot-cache/downloads/ first."
                      exit 1
                    fi
                  fi

                  # ── Config ──
                  cat > config.yaml <<'YAML'
                  llm_base_url: "http://localhost:8000/v1"
                  YAML

                  # ── Start vLLM in background ──
                  echo "=== Starting vLLM on Ascend NPU ==="
                  vllm serve /data/models/Qwen2.5-VL-7B-Instruct \
                    --host 0.0.0.0 --port 8000 \
                    --tensor-parallel-size 4 \
                    --max-model-len 16384 \
                    --enforce-eager \
                    --allowed-local-media-path /workspace/vidcopilot/cache \
                    > /tmp/vllm.log 2>&1 &
                  VLLM_PID=$!

                  # ── Wait for vLLM to be ready ──
                  echo "Waiting for vLLM to be ready..."
                  for i in $(seq 1 120); do
                    if curl -sf http://localhost:8000/v1/models >/dev/null 2>&1; then
                      echo "vLLM ready after ${i}0 seconds"
                      break
                    fi
                    if ! kill -0 $VLLM_PID 2>/dev/null; then
                      echo "ERROR: vLLM died. Last logs:"
                      tail -30 /tmp/vllm.log
                      exit 1
                    fi
                    sleep 10
                  done

                  if ! curl -sf http://localhost:8000/v1/models >/dev/null 2>&1; then
                    echo "ERROR: vLLM not ready after 20 minutes"
                    tail -50 /tmp/vllm.log
                    exit 1
                  fi

                  # ── Step 1: Run detailed analysis (no force_visual) ──
                  echo ""
                  echo "=== Running detailed analysis ==="
                  python3 agent/main.py analyze local "$VIDEO_PATH" \
                    --mode detailed \
                    --cache-root ./cache

                  echo "=== Analysis complete ==="

                  # ── Step 2: Run chat simulation ──
                  echo ""
                  echo "=== Running chat simulation ==="
                  python3 scripts/simulate_chat.py \
                    --video "$VIDEO_PATH" \
                    --api-base http://localhost:8000/v1 \
                    --cache-root ./cache \
                    --output ./cache/chat_simulation_SSya123u9Yk.json

                  echo "=== Chat simulation complete ==="

                  # ── Save results ──
                  RESULT_DIR="/data/vidcopilot-results/chat-$(date +%Y%m%d-%H%M%S)"
                  mkdir -p "$RESULT_DIR"
                  cp -r ./cache "$RESULT_DIR/" 2>/dev/null || true
                  echo "Results saved to $RESULT_DIR"

                  # Show chat transcript summary
                  echo ""
                  echo "=== Chat Transcript ==="
                  python3 -c "
                  import json
                  with open('./cache/chat_simulation_SSya123u9Yk.json') as f:
                      t = json.load(f)
                  print(f'Video: {t[\"video\"]}')
                  print(f'Questions: {len(t[\"questions\"])}')
                  for q in t['questions']:
                      print(f'  Q: {q[\"question\"]}')
                      print(f'  A: {q[\"answer\"][:200]}...')
                      print(f'  ({q[\"elapsed_sec\"]}s)')
                      print()
                  " 2>/dev/null || true

                  # Shutdown vLLM
                  kill $VLLM_PID 2>/dev/null || true
                  echo "=== Done ==="
              resources:
                limits:
                  cpu: '128'
                  huawei.com/Ascend910: '4'
                  memory: '200Gi'
                requests:
                  cpu: '128'
                  huawei.com/Ascend910: '4'
                  memory: '200Gi'
              volumeMounts:
                - name: 'vc-a3-llmit-data'
                  mountPath: '/data'
                - name: 'shm-data'
                  mountPath: '/dev/shm'
              imagePullPolicy: 'IfNotPresent'
          imagePullSecrets:
            - name: ccr-pull-secret
          restartPolicy: 'Never'
          nodeSelector:
            accelerator-type: 'module-910c-8'
            host-arch: 'huawei-arm'
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: 'resource.compute.sensecore.cn/machine-type'
                        operator: 'In'
                        values:
                          - 'h2ls.ru.k10'
      policies:
        - action: 'RestartJob'
          event: 'PodEvicted'
      maxRetry: 3
  plugins:
    hcclrank: []
    svc: []
  queue: 'default'
  maxRetry: 1
  priorityClassName: 'normal'
